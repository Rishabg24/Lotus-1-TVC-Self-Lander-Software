; ─────────────────────────────────────────────
;  Shared settings inherited by every env below
; ─────────────────────────────────────────────
[env]
platform        = teensy
board           = teensy41
framework       = arduino
monitor_speed   = 115200
upload_protocol = teensy-cli
lib_deps        = SPI
default_envs    = flight

; ─────────────────────────────────────────────
;  Flight  (no test flags — clean production build)
;  Usage: pio run -e flight -t upload
; ─────────────────────────────────────────────
[env:flight]
; inherits everything from [env] above — no extra flags needed

; ─────────────────────────────────────────────
;  Hardware test environments
;  Usage: pio run -e <name> -t upload
; ─────────────────────────────────────────────
[env:test_i2c_scan]
build_flags = -DTEST_I2C_SCAN

[env:test_spi_scan]
build_flags = -DTEST_SPI_SCAN

[env:test_imu_accel]
build_flags = -DTEST_IMU_ACCEL

[env:test_imu_gyro]
build_flags = -DTEST_IMU_GYRO

[env:test_imu_quaternion]
build_flags = -DTEST_IMU_QUATERNION

[env:test_servo]
build_flags = -DTEST_SERVO

[env:test_tvc]
build_flags = -DTEST_TVC

[env:test_logging]
build_flags = -DTEST_LOGGING

[env:test_baro]
build_flags = -DTEST_BARO